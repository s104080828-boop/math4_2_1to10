<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四下數學互動式學習</title>
  <style>
    :root{
      --bg:#f6fbf7;
      --card:#ffffff;
      --primary:#3f8f72;
      --primary2:#5da98a;
      --accent:#ff9f43;
      --text:#1f2d2a;
      --muted:#6b7c78;
      --pass:#2f9e44;
      --fail:#d9480f;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#f5fbf6,#eef8ff);color:var(--text)}
    .app{max-width:1200px;margin:0 auto;padding:20px}
    .header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
    .title-wrap h1{margin:0;font-size:32px}
    .title-wrap p{margin:6px 0 0;color:var(--muted)}
    .badge{background:#fff3e8;color:#b25a00;padding:10px 14px;border-radius:999px;font-weight:700;box-shadow:var(--shadow)}
    .panel{display:none}
    .panel.active{display:block}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
    .unit-card{cursor:pointer;transition:.2s transform,.2s box-shadow;border:2px solid transparent}
    .unit-card:hover{transform:translateY(-3px);border-color:#c8eadc}
    .unit-no{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;font-size:20px;font-weight:800;margin-bottom:10px}
    .unit-title{font-size:22px;font-weight:800;margin:4px 0}
    .unit-sub{color:var(--muted);font-size:14px;line-height:1.5}
    .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
    button{border:none;border-radius:12px;padding:12px 16px;font-size:16px;font-weight:700;cursor:pointer}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-secondary{background:#e9f6f0;color:var(--primary)}
    .btn-accent{background:var(--accent);color:#fff}
    .subgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:16px}
    .subcard{cursor:pointer;border:2px solid transparent;transition:.2s}
    .subcard:hover{transform:translateY(-2px);border-color:#ffe0bf}
    .subcard h3{margin-top:0}
    .back{background:#fff;border:1px solid #d9ece3;color:var(--primary)}
    .meta{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:14px;margin-top:8px}
    .pill{background:#eef8f2;color:var(--primary);padding:6px 10px;border-radius:999px;font-weight:700}
    .section-title{font-size:26px;margin:8px 0}
    .summary-box h4{margin-bottom:8px}
    .summary-box ul{margin:0;padding-left:20px;line-height:1.8}
    .question{padding:16px;border:1px solid #e7eeeb;border-radius:14px;margin:14px 0;background:#fff}
    .question h4{margin:0 0 12px;font-size:18px}
    .options label{display:block;padding:10px 12px;border:1px solid #dce8e3;border-radius:10px;margin:8px 0;cursor:pointer}
    .options input{margin-right:8px}
    .submit-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:18px 0}
    .result{padding:14px 16px;border-radius:14px;font-weight:800}
    .result.pass{background:#eaf7ec;color:var(--pass)}
    .result.fail{background:#fff1eb;color:var(--fail)}
    .reward{background:#fff4d8;color:#8a5b00;padding:14px 16px;border-radius:14px;font-weight:800;margin-top:10px}
    .passage{background:#fffef8;border:1px solid #f3e7c1;border-radius:14px;padding:16px;line-height:1.9;margin-bottom:14px}
    .challenge-set{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin:16px 0}
    .small{font-size:14px;color:var(--muted)}
    .footer-note{margin-top:20px;color:var(--muted);font-size:14px;text-align:center}
    @media (max-width:640px){
      .title-wrap h1{font-size:26px}
      .section-title{font-size:22px}
      .unit-title{font-size:20px}
    }
  
    .hero-banner{background:linear-gradient(135deg,#fff8e7,#fff1d6);border:2px solid #ffe1a8;position:relative;overflow:hidden}
    .hero-banner:before,.hero-banner:after{content:"✨";position:absolute;font-size:24px;animation:floatSpark 4s ease-in-out infinite;opacity:.75}
    .hero-banner:before{top:12px;right:18px}
    .hero-banner:after{bottom:10px;left:16px;animation-delay:1.2s}
    .adventure-note{color:#8a5a00;font-weight:700;margin-top:8px}
    .unit-card,.subcard,button,label{transition:transform .18s ease, box-shadow .18s ease, filter .18s ease}
    .unit-card:hover,.subcard:hover,button:hover,label:hover{box-shadow:0 10px 24px rgba(0,0,0,.12)}
    .unit-card:active,.subcard:active,button:active{transform:scale(.98)}
    .unit-card{position:relative;overflow:hidden}
    .unit-card::after,.subcard::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.42) 50%,transparent 100%);transform:translateX(-120%);transition:.65s}
    .unit-card:hover::after,.subcard:hover::after{transform:translateX(120%)}
    .btn-primary,.btn-accent{position:relative;overflow:hidden}
    .btn-primary{box-shadow:0 8px 18px rgba(63,143,114,.28)}
    .btn-accent{box-shadow:0 8px 18px rgba(255,159,67,.28)}
    .btn-primary:hover,.btn-accent:hover{transform:translateY(-1px)}
    .pulse{animation:pulseGlow 1.7s infinite}
    .small{color:var(--muted);line-height:1.7}
    .question,.challenge-set,.summary-box{position:relative;overflow:hidden}
    .question.correct{border-color:#b6e2c0;background:#f2fbf4}
    .question.wrong{border-color:#ffc9b3;background:#fff7f3}
    .question.unanswered{border-color:#ffe39e;background:#fffaf0}
    .question.correct::before,.question.wrong::before,.question.unanswered::before{position:absolute;top:10px;right:12px;font-size:20px;font-weight:800}
    .question.correct::before{content:"✓";color:#2f9e44}
    .question.wrong::before{content:"✗";color:#d9480f}
    .question.unanswered::before{content:"？";color:#b88900}
    .options{display:grid;gap:10px;margin-top:10px}
    .options label{display:block;padding:10px 12px;border:1px solid #dfebe7;border-radius:12px;background:#fcfffd;cursor:pointer}
    .options label.selected{border-color:#99cfb8;background:#eef9f3}
    .options label.correct-opt{border-color:#79c98b;background:#effaf1;font-weight:700}
    .options label.wrong-opt{border-color:#f3a38d;background:#fff1ec}
    .passage{line-height:1.95;background:#fffdf8;border:1px solid #f2ead8;padding:16px;border-radius:14px;white-space:pre-wrap}
    .submit-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:22px 0 4px}
    .result{padding:16px 18px;border-radius:16px;font-weight:800;margin-top:18px;box-shadow:var(--shadow);animation:riseIn .45s ease}
    .result.pass{background:#eefaf0;color:#246b35;border:1px solid #c7e9cf}
    .result.fail{background:#fff3ef;color:#b24b24;border:1px solid #ffd0c0}
    .reward{margin-top:14px;padding:14px 16px;border-radius:16px;background:linear-gradient(135deg,#fff3cf,#ffe39d);border:1px solid #ffd369;font-weight:800;color:#8a5a00;animation:treasureGlow 1.8s infinite}
    .review{margin-top:18px}
    .review .answer-line{margin-top:8px;color:#42524f;line-height:1.8}
    .review .answer-line strong{color:#1f2d2a}
    .highlight-tools{position:fixed;right:16px;bottom:16px;display:flex;gap:10px;z-index:1200;flex-direction:column}
    .highlight-tools button{padding:12px 14px;border-radius:999px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
    .highlight-mark{background:linear-gradient(transparent 35%, #fff29a 35%, #fff29a 88%, transparent 88%);padding:0 .08em;border-radius:4px}
    .overlay{position:fixed;inset:0;background:rgba(19,29,28,.48);display:none;align-items:center;justify-content:center;padding:20px;z-index:2000}
    .overlay.show{display:flex}
    .treasure-box{max-width:520px;width:min(92vw,520px);background:linear-gradient(180deg,#fffdf6,#fff5dc);border-radius:28px;padding:28px 24px;text-align:center;box-shadow:0 22px 70px rgba(0,0,0,.28);border:3px solid #ffd77d;position:relative;overflow:hidden;animation:riseIn .35s ease}
    .treasure-box h2{margin:8px 0 10px;font-size:30px}
    .treasure-box .big-icon{font-size:62px;animation:bob 2s ease-in-out infinite}
    .treasure-box .score-tag{display:inline-block;margin-top:8px;padding:8px 14px;border-radius:999px;background:#fff3cf;color:#8a5a00;font-weight:800}
    .treasure-box .loot{margin-top:14px;font-size:24px;font-weight:900;color:#b06700}
    .fx-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1900}
    .particle{position:absolute;font-size:24px;animation:particleFly 1.5s ease-out forwards;will-change:transform,opacity}
    .score-stars{display:flex;justify-content:center;gap:8px;margin-top:10px;font-size:24px}
    .score-stars span{animation:popIn .35s ease both}
    .journey-bar{height:14px;background:#edf2ef;border-radius:999px;overflow:hidden;margin:14px 0 4px;border:1px solid #dde8e3}
    .journey-fill{height:100%;background:linear-gradient(90deg,#ffcf5a,#ff9f43);width:0;border-radius:999px;transition:width .6s ease}
    .shake{animation:shake .35s ease}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 rgba(255,159,67,0)}50%{box-shadow:0 0 0 10px rgba(255,159,67,.14)}}
    @keyframes treasureGlow{0%,100%{box-shadow:0 0 0 rgba(255,211,105,0)}50%{box-shadow:0 0 0 12px rgba(255,211,105,.18)}}
    @keyframes riseIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes floatSpark{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(12deg)}}
    @keyframes particleFly{0%{opacity:1;transform:translate(var(--sx),var(--sy)) scale(.6)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.5)}}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    @media (max-width: 640px){.title-wrap h1{font-size:26px}.section-title{font-size:22px}.treasure-box h2{font-size:24px}}

  
.music-dock{position:fixed;left:16px;bottom:18px;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-radius:16px;box-shadow:var(--shadow);padding:10px 12px;display:flex;align-items:center;gap:10px;max-width:min(92vw,380px)}
.music-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.music-meta strong{font-size:14px}
.music-meta span{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-dock .tiny{padding:10px 12px;border-radius:10px;font-size:14px}
@media (max-width:700px){.music-dock{left:10px;right:10px;bottom:84px;max-width:none}}

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-wrap">
      <h1>國小四下數學互動式學習</h1>
      <p>10 個單元 × 單元重點 × 互動式問題 × 素養挑戰</p>
    </div>
    <div class="badge">85 分以上獎勵：31 冰淇淋 🍦</div>
  </div>

  <section id="homePanel" class="panel active">
    <div class="card">
      <div class="section-title">首頁｜選擇單元</div>
      <div class="small">每個單元都包含：本單元重點整理、互動式問題（滿分 100）、素養挑戰（每次自 20 題組亂數抽 5 題組，滿分 100）。</div>
    </div>
    <div id="unitGrid" class="grid" style="margin-top:16px"></div>
  </section>

  <section id="unitPanel" class="panel"></section>
  <section id="contentPanel" class="panel"></section>

  <div class="footer-note">建議做法：先看重點，再做互動題，最後挑戰素養題。數學不怕慢，怕的是亂衝。</div>
</div>

<script>
const units = [
  {
    id:1,
    title:'概數',
    subtitle:'生活中的概數、無條件捨去法、無條件進入法、四捨五入法',
    summary:[
      '知道概數是「接近的數」，常用在快速估算與生活判斷。',
      '無條件捨去法：直接去掉後面數字，不管大小。',
      '無條件進入法：只要取概數，就往上一個單位進位。',
      '四捨五入法：看下一位，4 以下捨去，5 以上進位。',
      '要先看清楚題目要求取概數到哪一位：十位、百位、千位、萬位。',
      '常見應用：票價、人口、金額、距離、物品數量估算。'
    ],
    practiceKeywords:['概數','四捨五入','無條件進入','無條件捨去','取概數','估算'],
    literacyConcept:'概數與估算',
    literacyFocus:['判斷哪種取概數方法合適','比較估算值與原數的關係','理解題目中為何用估算','依情境決定取到哪一位']
  },
  {
    id:2,
    title:'四則運算',
    subtitle:'列式與逐步求解、先乘除後加減、由左而右算、四則運算性質',
    summary:[
      '會把文字題列成算式，不只會一步一步算，也要會併式。',
      '有括號先算括號。',
      '沒有括號時，先乘除、後加減。',
      '同級運算要由左而右。',
      '要養成檢查運算順序的習慣，避免看見數字就亂算。',
      '常見情境：購物、分組、每人幾個、共幾元、還剩多少。'
    ],
    practiceKeywords:['列式','先乘除後加減','由左而右','括號','四則運算','併式'],
    literacyConcept:'四則運算',
    literacyFocus:['從情境找正確算式','判斷運算順序','分辨哪一種列式較合理','檢查答案是否符合情境']
  },
  {
    id:3,
    title:'垂直、平行與四邊形',
    subtitle:'垂直與平行、長方形與正方形、認識四邊形與平行四邊形',
    summary:[
      '垂直：兩條直線交成直角。',
      '平行：兩條直線延長後也不會相交。',
      '長方形有四個直角，對邊平行且等長。',
      '正方形有四個直角，而且四邊等長。',
      '平行四邊形的對邊互相平行。',
      '要會看圖、會分類，也要會在方格紙上畫出指定圖形。'
    ],
    practiceKeywords:['垂直','平行','長方形','正方形','平行四邊形','四邊形'],
    literacyConcept:'平面圖形特徵',
    literacyFocus:['依特徵辨認圖形','判斷邊與角的關係','看生活物件對應哪種圖形','從描述反推圖形名稱']
  },
  {
    id:4,
    title:'分數（一）',
    subtitle:'同分母分數的加減法、分數的整數倍',
    summary:[
      '分母表示平均分成幾份，分子表示取了幾份。',
      '同分母分數加減：分母不變，只加減分子。',
      '能從圖形、數線與文字情境理解分數。',
      '整數倍的分數可以看成重複加。',
      '要先分清楚題目是合起來、用掉、剩下，才知道要加或減。',
      '常見錯誤是把分母也一起加減。'
    ],
    practiceKeywords:['分數','同分母','加減法','分子','分母','整數倍'],
    literacyConcept:'分數大小與運算',
    literacyFocus:['從情境判斷用加或減','理解分數代表的份量','用圖意比較剩下或合起來的量','連結重複加與整數倍']
  },
  {
    id:5,
    title:'形體的大小',
    subtitle:'認識體積、認識立方公分、體積有多大',
    summary:[
      '體積是形體占有空間的大小。',
      '容量是容器能裝多少，和體積概念相關但不完全相同。',
      '立方公分是常見的體積單位。',
      '會用小立方體堆疊數量來判斷體積。',
      '要注意有些方塊被遮住，也可能仍然存在。',
      '這一單元重點是建立量感與空間感，不是死背公式。'
    ],
    practiceKeywords:['體積','容量','立方公分','小立方體','空間','形體'],
    literacyConcept:'體積與容量',
    literacyFocus:['從描述判斷誰占空間較大','數立方體推體積','區分面積與體積','把生活容器和容量概念連結']
  },
  {
    id:6,
    title:'小數乘法',
    subtitle:'乘數是一位小數、一位小數乘以整數、二位小數乘以整數',
    summary:[
      '會用整數乘法的方式先算，再決定小數點位置。',
      '一位小數乘整數、二位小數乘整數都要熟練。',
      '能從錢、長度、重量情境理解小數乘法。',
      '小數點位置不能亂點，要依原數共有幾位小數決定。',
      '0.6 × 8 和 6 × 8 不一樣，0 不可忽略。',
      '計算完可先估算，檢查答案是否合理。'
    ],
    practiceKeywords:['小數乘法','一位小數','二位小數','整數','小數點','估算'],
    literacyConcept:'小數乘法',
    literacyFocus:['從情境列式','判斷答案大約範圍','檢查小數點位置','理解單價與數量的關係']
  },
  {
    id:7,
    title:'周長與面積',
    subtitle:'長方形與正方形的周長、長方形與正方形的面積、平方公尺與平方公分',
    summary:[
      '周長是外框一圈的長度；面積是表面的大小。',
      '長方形周長＝（長＋寬）× 2。',
      '長方形面積＝長 × 寬。',
      '正方形周長＝邊長 × 4；面積＝邊長 × 邊長。',
      '面積單位要寫平方公分或平方公尺。',
      '最常見錯誤是把周長與面積公式混在一起。'
    ],
    practiceKeywords:['周長','面積','長方形','正方形','平方公分','平方公尺'],
    literacyConcept:'周長與面積',
    literacyFocus:['辨認該算周長還是面積','應用公式解生活題','理解單位意義','比較不同設計的圍邊或鋪面需求']
  },
  {
    id:8,
    title:'分數（二）',
    subtitle:'等值分數、簡單異分母分數比較、簡單異分母分數加減、分數與小數',
    summary:[
      '等值分數表示寫法不同，但大小相同。',
      '比較分數大小時，不可只看分母或分子其中一個。',
      '可透過畫圖、通分或生活情境理解異分母分數。',
      '分數與小數之間有對應關係，例如 1/2 和 0.5。',
      '先理解分數代表的量，再做比較與加減。',
      '常見錯誤是分母越大就誤以為分數越大。'
    ],
    practiceKeywords:['等值分數','異分母','比較大小','分數與小數','通分','分數'],
    literacyConcept:'分數比較與連結',
    literacyFocus:['從圖比較分數大小','判斷等值分數','用生活情境理解異分母比較','連結小數表示']
  },
  {
    id:9,
    title:'時間的計算',
    subtitle:'2時制和24時制、日小時換算、時分秒換算與加減',
    summary:[
      '要熟悉 2 時制和 24 時制之間的轉換。',
      '1 日＝24 小時，1 小時＝60 分，1 分＝60 秒。',
      '時間加減要注意跨整點、跨中午、跨日期。',
      '先統一單位，再比較或計算較不容易錯。',
      '應用題常問「經過多久」、「幾點開始」、「幾點結束」。',
      '60 進位與借位是這單元最常見失分點。'

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function openPractice(unitId){
  const u = units.find(x=>x.id===unitId);
  const bank = createPracticeBank(u);
  const panel = document.getElementById('contentPanel');
  panel.innerHTML = `
    <div class="toolbar">
      <button class="back" onclick="openUnit(${u.id})">← 返回單元</button>
      <div class="pill">第${u.id}單元｜互動式問題</div>
      <button class="btn-secondary" onclick="openPractice(${u.id})">重新出題</button>
    </div>
    <div class="card">
      <div class="section-title">${u.title}｜互動式問題</div>
      <div class="small">共 10 題，每題 10 分，滿分 100。答題時可用螢光筆先劃記關鍵資訊。</div>
      <form id="practiceForm">
        ${bank.map((q,idx)=>`
          <div class="question">
            <h4>${idx+1}. ${q[0]}</h4>
            <div class="options">
              ${q[1].map((opt,i)=>`<label><input type="radio" name="q${idx}" value="${i}">${opt}</label>`).join('')}
            </div>
          </div>
        `).join('')}
        <div class="submit-row">

function gradePractice(bank, unitId){
  const form = document.getElementById('practiceForm');
  let correct = 0;
  bank.forEach((q,idx)=>{
    const chosen = form.querySelector(`input[name="q${idx}"]:checked`);
    if(chosen && Number(chosen.value) === q[2]) correct++;
  });
  const score = correct * 10;
  document.querySelectorAll('#practiceForm .question').forEach((box,idx)=>{
    const chosen = form.querySelector(`input[name="q${idx}"]:checked`);
    box.classList.remove('correct','wrong','unanswered');
    if(!chosen) box.classList.add('unanswered');
    else if(Number(chosen.value)===bank[idx][2]) box.classList.add('correct');
    else box.classList.add('wrong');
  });
  let html = `<div class="result ${score>=60?'pass':'fail'}">成績：${score} 分｜答對 ${correct} / 10 題｜${score>=60?'及格':'再練習一次會更穩'}</div>`;
  if(score>=85) html += `<div class="reward">恭喜達成 85 分以上！獎勵：31 冰淇淋 🍦</div>`;
  html += reviewBlockForPractice(bank, form);
  html += `<div class="submit-row"><button class="btn-secondary" onclick="openPractice(${unitId})">再挑戰一次</button></div>`;
  document.getElementById('practiceResult').innerHTML = html;
  if(score>=60) playGood(); else playBad();
  showTreasureOverlay(score, score>=60, score>=85 ? '獎勵：31 冰淇淋 🍦' : '');
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}


function addUniqueOptions(correct){
  const set = new Set([correct]);
  const deltas = [1,2,3,4,5,10,-1,-2,-3,-4,-5,-10];
  let i = 0;
  while(set.size < 4 && i < 40){
    const v = correct + deltas[i % deltas.length];
    if(v >= 0) set.add(v);
    i++;
  }
  const arr = Array.from(set).slice(0,4);
  return shuffle(arr);
}
function makeMCQ(q, correct, formatter=(x)=>String(x)){
  const optsRaw = addUniqueOptions(correct);
  return { q, opts: optsRaw.map(formatter), ans: optsRaw.indexOf(correct) };
}
function fmtFraction(n,d){ return `${n}/${d}`; }

      const passage = `${opener(index)}為了替${t.topic}做宣傳，${t.hero}要在${t.place}布置一塊長方形展示板，長 ${l} 公分、寬 ${w} 公分。老師故意把任務分成兩種：如果要在四周貼亮片邊條，就是在算外框一圈多長，也就是周長；如果要整面貼上背景紙，則是在算整個表面有多大，也就是面積。接著老師又拿出一塊邊長 ${square} 公分的正方形招牌，請大家比較長方形和正方形在計算上的不同。這一類題在段考很愛用海報、地墊、相框、包裝紙或舞台布景包裝，因為它能測出學生有沒有真正理解「一圈的長度」和「整面大小」是不同的量。${t.partner}說，有時候看起來像是在做美術，其實背後是在練非常重要的數學判斷：問題到底在問周長，還是面積？你只要先把這一點分清楚，再套上正確公式，整題就不會亂掉。${closer(index)}`;
      return { passage, questions:[
        makeMCQ(`長方形展示板的周長是多少公分？`, peri),
        makeMCQ(`長方形展示板的面積是多少平方公分？`, area),
        makeMCQ(`正方形招牌的周長是多少公分？`, square*4),
        makeMCQ(`正方形招牌的面積是多少平方公分？`, square*square)
      ]};
    }
    case 8: {
      const a = 1 + index % 3;
      const b = 2 + index % 4;
      const d1 = 4 + index % 3;
      const d2 = d1 * 2;
      const n2 = a * 2;
      const passage = `${opener(index)}${t.hero}和${t.partner}在${t.place}分配限定彩帶與裝飾紙。第一卷已經用了 ${a}/${d1}，第二卷用了 ${b}/${d2}。老師提醒同學，這一題不能只看哪個分母比較大、或哪個分子比較多，因為兩個分數都代表「整卷裡用掉多少部分」，比較時必須先想它們是不是能改寫成同樣的分母。於是老師拿出圖卡示範：如果把 ${a}/${d1} 的每一份再平均分成 2 份，原本的大小其實沒有變，只是寫法改了，這就叫等值分數。這種概念很重要，因為很多孩子在閱讀題時看見不同寫法就以為量不同，但其實它們可能一樣大。就像遊戲裡不同貨幣單位換算後可能代表同樣價值，分數也能改寫成不同形式。現在請你根據故事中的彩帶資料，找出與原分數相等的分數，並完成比較。${closer(index)}`;
      return { passage, questions:[
        { q:`和 ${a}/${d1} 相等的分數是哪一個？`, opts:[fmtFraction(n2,d2), fmtFraction(n2+1,d2), fmtFraction(a,d2), fmtFraction(a+1,d1)], ans:0 },
        { q:`${a}/${d1} 和 ${n2}/${d2} 比較，哪一個正確？`, opts:['一樣大', `${a}/${d1} 較大`, `${n2}/${d2} 較大`, '無法比較'], ans:0 },
        { q:`若 ${a}/${d1} 轉成分母是 ${d2} 的分數，分子應是多少？`, opts:[String(n2), String(n2+1), String(a), String(a+2)], ans:0 },
        { q:`比較 ${a}/${d1} 與 ${b}/${d2} 時，若先把 ${a}/${d1} 轉成分母 ${d2}，新的分數是？`, opts:[fmtFraction(n2,d2), fmtFraction(n2+1,d2), fmtFraction(a,d2), fmtFraction(a+2,d2)], ans:0 }
      ]};
    }
    case 9: {
      const startH = 8 + index % 5;
      const startM = [10,15,20,25,30][index % 5];
      const durM = 35 + (index % 4) * 10;
      const totalM = startH*60 + startM + durM;
      const endH = Math.floor(totalM / 60);
      const endM = totalM % 60;
      const secs = (3 + index % 4) * 60;
      const passage = `${opener(index)}${t.topic}的正式錄影在上午 ${startH} 點 ${String(startM).padStart(2,'0')} 分開始，${t.hero}負責看流程表，${t.partner}負責提醒大家換場。第一段活動共進行 ${durM} 分鐘，內容包含暖場、任務說明和實際闖關。老師在黑板上寫下時間後，先問同學：如果活動跨過整點，直接用眼睛看時鐘會不會算錯？有些人喜歡一格一格往後推，有些人會先把時和分都換成總分鐘數再計算，兩種方法都可以，但關鍵是單位要一致。後來暖身遊戲又需要 ${secs} 秒，這時還得把秒和分鐘互相換算，才不會把 60 進位忘掉。這類時間題常藏在活動流程、影片拍攝、比賽賽程或交通安排裡，表面看起來很生活化，其實每一步都在考你能不能抓出開始時刻、經過時間，以及何時該先換算單位。${closer(index)}`;
      return { passage, questions:[
        { q:`第一段活動結束時是幾點幾分？`, opts:[`${endH}點${String(endM).padStart(2,'0')}分`, `${endH}點${String((endM+5)%60).padStart(2,'0')}分`, `${endH+1}點${String(endM).padStart(2,'0')}分`, `${startH}點${String((startM+durM)%60).padStart(2,'0')}分`], ans:0 },
        makeMCQ(`這段活動共進行多少分鐘？`, durM),
        makeMCQ(`${secs} 秒等於多少分鐘？`, secs/60),
        makeMCQ(`從 ${startH} 點 ${String(startM).padStart(2,'0')} 分到 ${endH} 點 ${String(endM).padStart(2,'0')} 分，共經過多少分鐘？`, durM)
      ]};
    }
    case 10: {
      const first = 5 + index % 4;
      const diff = 3 + index % 3;
      const second = first + diff;
      const third = second + diff;
      const fourth = third + diff;
      const evenOdd = fourth % 2 === 0 ? '偶數' : '奇數';
      const passage = `${opener(index)}在${t.topic}的最終回合裡，${t.hero}要依照線索找到能量石的規律。第一站有 ${first} 顆，第二站有 ${second} 顆，第三站有 ${third} 顆。很多同學看到這種題就想直接猜第四站，但老師特別提醒：規律題最重要的不是猜中，而是先說出「每一步怎麼變」。有些數列是每次都加同樣的數，有些則可能重複循環或交替變化，所以一定要先比較相鄰兩個數之間的差。等你發現第一站到第二站、第二站到第三站都增加同樣的數後，後面的答案就能繼續往下推。這很像遊戲關卡裡的獎勵表，若你看懂成長規律，就能預測下一關的資源數量，甚至判斷拿到的是奇數還是偶數。故事看起來像闖關，其實考的是推理和觀察。${closer(index)}`;
      return { passage, questions:[
        makeMCQ(`照這個規律，第四站會有幾顆能量石？`, fourth),
        makeMCQ(`每往下一站，能量石增加幾顆？`, diff),
        { q:`第四站的數是什麼性質？`, opts:[evenOdd, evenOdd==='偶數'?'奇數':'偶數', '質數', '無法判斷'], ans:0 },
        makeMCQ(`若規律再繼續一次，第五站會有幾顆能量石？`, fourth + diff)
      ]};
    }
    default:
      return { passage:'', questions:[] };
  }
}
function buildChallengeBank(unit){
  const bank = [];
  for(let i=0;i<20;i++) bank.push(unitMathScenario(unit, i));
  return bank;
}

const challengeQueueState = {};
function challengeKey(unitId){ return `g4s2_challenge_queue_u${unitId}`; }
function loadChallengeQueue(unitId){
  if(challengeQueueState[unitId]) return challengeQueueState[unitId];
  try{
    const raw = localStorage.getItem(challengeKey(unitId));
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed)){
        challengeQueueState[unitId] = parsed;
        return parsed;
      }
    }
  }catch(e){}
  challengeQueueState[unitId] = [];
  return challengeQueueState[unitId];
}
function saveChallengeQueue(unitId){
  try{ localStorage.setItem(challengeKey(unitId), JSON.stringify(challengeQueueState[unitId] || [])); }catch(e){}
}
function refillChallengeQueue(unitId, size){
  const current = loadChallengeQueue(unitId);
  const available = [...Array(size).keys()].filter(i => !current.includes(i));
  if(available.length){
    challengeQueueState[unitId] = current.concat(shuffle(available));
  }
  if(challengeQueueState[unitId].length < 5){
    challengeQueueState[unitId] = challengeQueueState[unitId].concat(shuffle([...Array(size).keys()]));
  }
  saveChallengeQueue(unitId);
}
function getNextChallengeSets(unit){
  const bank = buildChallengeBank(unit);
  loadChallengeQueue(unit.id);
  if(challengeQueueState[unit.id].length < 5) refillChallengeQueue(unit.id, bank.length);
  const selectedIdx = challengeQueueState[unit.id].splice(0,5);
  saveChallengeQueue(unit.id);
  return selectedIdx.map(i => bank[i]);
}
function openChallenge(unitId){
  const u = units.find(x=>x.id===unitId);
  const sets = getNextChallengeSets(u);
  const panel = document.getElementById('contentPanel');
  panel.innerHTML = `
    <div class="toolbar">
      <button class="back" onclick="openUnit(${u.id})">← 返回單元</button>
      <div class="pill">第${u.id}單元｜素養挑戰</div>
      <button class="btn-secondary" onclick="openChallenge(${u.id})">下一批 5 題組</button>
    </div>
    <div class="card">
      <div class="section-title">${u.title}｜素養挑戰</div>
      <div class="small">題庫共 20 題組，每次亂數抽 5 題組；同一單元會先輪完 20 題組後才重新洗牌。每題組 4 題四選一，共 20 題；每題 5 分，滿分 100。60 分及格，85 分以上獎勵 31 冰淇淋。題目較長時可先用螢光筆劃記條件。</div>
      <form id="challengeForm">
        ${sets.map((set,setIdx)=>`
          <div class="challenge-set">
            <h3>題組 ${setIdx+1}</h3>
            <div class="passage">${set.passage}</div>
            ${set.questions.map((q,qIdx)=>`
              <div class="question">
                <h4>${setIdx+1}-${qIdx+1}. ${q.q}</h4>
                <div class="options">
                  ${q.opts.map((opt,optIdx)=>`<label><input type="radio" name="s${setIdx}q${qIdx}" value="${optIdx}">${opt}</label>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        `).join('')}
        <div class="submit-row">
          <button type="button" class="btn-primary" onclick='gradeChallenge(${JSON.stringify(sets).replace(/'/g,"&#39;")}, ${u.id})'>交卷</button>
        </div>
      </form>
      <div id="challengeResult"></div>
    </div>`;
  showPanel('contentPanel');
  attachOptionEffects(panel);
}

function gradeChallenge(sets, unitId){
  const form = document.getElementById('challengeForm');
  let correct = 0;
  let total = 0;
  sets.forEach((set,setIdx)=>{
    set.questions.forEach((q,qIdx)=>{
      total++;
      const chosen = form.querySelector(`input[name="s${setIdx}q${qIdx}"]:checked`);
      if(chosen && Number(chosen.value) === q.ans) correct++;
    });
  });
  const score = correct * 5;
  let html = `<div class="result ${score>=60?'pass':'fail'}">成績：${score} 分｜答對 ${correct} / ${total} 題｜${score>=60?'及格':'尚未及格，再讀一次文章重點會更好'}</div>`;
  if(score>=85) html += `<div class="reward">太棒了！85 分以上，獎勵：31 冰淇淋 🍦</div>`;
  html += reviewBlockForChallenge(sets, form);
  html += `<div class="submit-row"><button class="btn-secondary" onclick="openChallenge(${unitId})">再挑戰一次</button></div>`;
  document.getElementById('challengeResult').innerHTML = html;
  if(score>=60) playGood(); else playBad();
  showTreasureOverlay(score, score>=60, score>=85 ? '獎勵：31 冰淇淋 🍦' : '');
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}


const audioCtx = window.AudioContext ? new AudioContext() : (window.webkitAudioContext ? new webkitAudioContext() : null);
let audioEnabled = false;
function unlockAudio(){
  if(audioCtx && !audioEnabled){ audioEnabled = true; if(audioCtx.state === 'suspended') audioCtx.resume(); }
}
document.addEventListener('click', unlockAudio, {once:false});
function playTone(freq=440, duration=.08, type='sine', volume=.035, delay=0){
  if(!audioCtx) return;
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(volume, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + duration + 0.02);
}
function playClick(){ playTone(520,.05,'triangle',.02); }
function playGood(){ playTone(660,.08,'triangle',.03); playTone(880,.12,'triangle',.025,.07); }
function playBad(){ playTone(240,.09,'sawtooth',.022); playTone(180,.12,'sawtooth',.018,.07); }
function playTreasure(){ [523,659,784,1046].forEach((f,i)=>playTone(f,.15,'triangle',.03,i*.08)); }

let bgmTimer = null;
let bgmStep = 0;
let bgmOn = false;
const bgmLead = [523,659,784,659,587,659,698,784,659,587,523,392,440,523,659,698];
const bgmBell = [1046,1318,1568,1318,1174,1318,1396,1568,1318,1174,1046,784,880,1046,1318,1396];
const bgmBass = [261,196,220,196,174,196,220,261];
function updateMusicStatus(text){ const el=document.getElementById('musicStatus'); if(el) el.textContent=text; }
function bgmNote(freq, duration, type, volume, delay=0){ playTone(freq,duration,type,volume,delay); }
function startBgm(){
  if(!audioCtx) { updateMusicStatus('這個瀏覽器不支援背景音功能'); return; }
  unlockAudio();
  stopBgm();
  bgmOn = true;
  bgmStep = 0;
  const btn=document.getElementById('musicToggle'); if(btn) btn.textContent='⏸️ 暫停音樂';
  updateMusicStatus('播放中｜原創輕柔鋼琴／鐘琴／低音弦樂風');
  const tick = ()=>{
    const i = bgmStep % bgmLead.length;
    const j = bgmStep % bgmBass.length;
    bgmNote(bgmBass[j], 0.55, 'sine', 0.012);
    bgmNote(bgmLead[i], 0.32, 'triangle', 0.010, 0.03);
    bgmNote(bgmBell[i], 0.18, 'sine', 0.004, 0.11);
    if(i % 4 === 0) bgmNote(bgmLead[(i+2)%bgmLead.length]/2, 0.4, 'sine', 0.004, 0.16);
    bgmStep++;
  };
  tick();
  bgmTimer = setInterval(tick, 620);
}
function stopBgm(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } bgmOn=false; const btn=document.getElementById('musicToggle'); if(btn) btn.textContent='🎵 開啟音樂'; updateMusicStatus('未播放｜可在 Safari 或 GitHub Pages 開啟後點擊播放'); }
function toggleBgm(){ if(bgmOn) stopBgm(); else startBgm(); }
function attachOptionEffects(scope=document){
  scope.querySelectorAll('.options label').forEach(label=>{
    label.addEventListener('click', ()=>{
      playClick();
      const wrap = label.parentElement;
      wrap.querySelectorAll('label').forEach(l=>l.classList.remove('selected'));
      label.classList.add('selected');
    });
  });
}
function burstParticles(symbols=['✨','⭐','🪙','💎'], count=18){
  const layer=document.getElementById('fxLayer');
  if(!layer) return;
  const rect={x:window.innerWidth/2,y:window.innerHeight/2};
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='particle';
    el.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left=rect.x+'px';
    el.style.top=rect.y+'px';
    el.style.setProperty('--sx','0px');
    el.style.setProperty('--sy','0px');
    el.style.setProperty('--tx',`${(Math.random()*320-160).toFixed(0)}px`);
    el.style.setProperty('--ty',`${(-80-Math.random()*260).toFixed(0)}px`);
    layer.appendChild(el);
    setTimeout(()=>el.remove(),1500);
  }
}
function showTreasureOverlay(score, passed, rewardText=''){
  const ov=document.getElementById('treasureOverlay');
  const title=document.getElementById('treasureTitle');
  const scoreEl=document.getElementById('treasureScore');
  const text=document.getElementById('treasureText');
  const loot=document.getElementById('treasureLoot');

  scoreEl.textContent=`分數：${score} 分`;

  for(let i=0;i<starCount;i++) stars.innerHTML += `<span style="animation-delay:${i*0.08}s">⭐</span>`;
  fill.style.width='0%';
  requestAnimationFrame(()=> fill.style.width = `${Math.min(100,score)}%`);
  if(score>=85){
    title.textContent='寶箱打開了！';

    loot.textContent='本次獲得：通關徽章 🏅';

    loot.textContent='本次獲得：冒險提示卷軸 📜';
    icon.textContent='📜';
    playBad();
  }
  ov.classList.add('show');
}
function closeTreasure(e){ if(e) e.stopPropagation(); document.getElementById('treasureOverlay').classList.remove('show'); }
function applyHighlight(){
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed || sel.rangeCount===0) return;
  const range = sel.getRangeAt(0);
  const span = document.createElement('span');
  span.className='highlight-mark';
  try{ range.surroundContents(span); playClick(); sel.removeAllRanges(); }catch(err){ playBad(); }
}
function clearHighlights(){
  document.querySelectorAll('.highlight-mark').forEach(el=>{
    const parent=el.parentNode; while(el.firstChild) parent.insertBefore(el.firstChild, el); parent.removeChild(el); parent.normalize();
  });
  playClick();
}
function reviewBlockForPractice(bank, form){
  return `<div class="review">${bank.map((q,idx)=>{
    const chosen = form.querySelector(`input[name="q${idx}"]:checked`);
    const chosenIndex = chosen ? Number(chosen.value) : null;
    const state = chosen===null ? 'unanswered' : (chosenIndex===q[2] ? 'correct':'wrong');
    return `<div class="question ${state}"><h4>${idx+1}. ${q[0]}</h4><div class="answer-line"><strong>你的答案：</strong>${chosenIndex===null?'未作答':q[1][chosenIndex]}</div><div class="answer-line"><strong>正確答案：</strong>${q[1][q[2]]}</div></div>`;
  }).join('')}</div>`;
}
function reviewBlockForChallenge(sets, form){
  let n=0;
  return `<div class="review">${sets.map((set,setIdx)=>`<div class="challenge-set"><h3>題組 ${setIdx+1}</h3>${set.questions.map((q,qIdx)=>{
    n++;
    const chosen = form.querySelector(`input[name="s${setIdx}q${qIdx}"]:checked`);
    const chosenIndex = chosen ? Number(chosen.value) : null;
    const state = chosen===null ? 'unanswered' : (chosenIndex===q.ans ? 'correct':'wrong');
    return `<div class="question ${state}"><h4>${n}. ${q.q}</h4><div class="answer-line"><strong>你的答案：</strong>${chosenIndex===null?'未作答':q.opts[chosenIndex]}</div><div class="answer-line"><strong>正確答案：</strong>${q.opts[q.ans]}</div></div>`;
  }).join('')}</div>`).join('')}</div>`;
}
